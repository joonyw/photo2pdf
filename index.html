<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo to PDF Merger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📸 Photo to PDF Merger</h1>
        <p class="subtitle">Convert your photos into a single PDF document</p>
        
        <div class="upload-section">
            <div class="drop-zone" id="dropZone">
                <div class="drop-icon">📁</div>
                <p>Drag and drop photos here or click to select</p>
                <input 
                    type="file" 
                    id="fileInput" 
                    multiple 
                    accept="image/png,image/jpeg,image/jpg,image/webp,image/gif"
                    hidden
                >
                <button id="selectBtn" class="btn btn-primary">Select Photos</button>
            </div>
        </div>

        <div class="options-section" id="optionsSection" style="display: none;">
            <div class="option-group">
                <label for="orientation">Orientation:</label>
                <select id="orientation">
                    <option value="portrait">Portrait</option>
                    <option value="landscape">Landscape</option>
                </select>
            </div>

            <div class="option-group">
                <label for="format">Page Format:</label>
                <select id="format">
                    <option value="A4">A4</option>
                    <option value="Letter">Letter</option>
                    <option value="A5">A5</option>
                </select>
            </div>

            <div class="option-group">
                <label for="scaling">Image Scaling:</label>
                <select id="scaling">
                    <option value="fit">Fit to Page</option>
                    <option value="fill">Fill Page</option>
                    <option value="original">Keep Original Size</option>
                </select>
            </div>
        </div>

        <div class="preview-section" id="previewSection" style="display: none;">
            <h2>Selected Photos</h2>
            <div class="preview-container" id="previewContainer"></div>
        </div>

        <div class="button-group" id="buttonGroup" style="display: none;">
            <button id="clearBtn" class="btn btn-secondary">Clear</button>
            <button id="generateBtn" class="btn btn-success">Generate PDF</button>
        </div>

        <div id="progress" class="progress" style="display: none;">
            <div class="progress-bar" id="progressBar"></div>
            <p id="progressText">Processing...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
